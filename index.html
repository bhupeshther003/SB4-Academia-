<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SB4 Academia Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        [v-cloak] { display: none; }
        
        .fade-in-bottom {
            animation: fadeInBottom 0.5s ease-out;
        }
        @keyframes fadeInBottom {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 overflow-hidden">

    <div id="app" class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:static z-40 w-72 h-full bg-white border-r border-gray-200 transition-transform duration-300 ease-in-out flex flex-col -translate-x-full lg:translate-x-0">
            <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <div class="bg-blue-600 p-2 rounded-lg text-white">
                        <i data-lucide="book-open" class="w-5 h-5"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight">SB4 Academia</h1>
                </div>
                <button onclick="toggleSidebar(false)" class="lg:hidden text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Program Tabs -->
            <div id="program-tabs" class="flex p-2 bg-gray-100 m-4 rounded-lg overflow-x-auto no-scrollbar">
                <!-- Tabs generated by JS -->
            </div>

            <!-- Navigation -->
            <nav id="nav-list" class="flex-1 overflow-y-auto px-4 pb-4 custom-scrollbar space-y-2">
                <!-- List generated by JS -->
            </nav>

            <!-- Sidebar Footer -->
            <div class="p-4 border-t border-gray-100">
                <div class="flex items-center p-2 rounded-lg bg-gray-50">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center text-white text-xs font-bold mr-3">
                        JD
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold truncate">Trainee Access</p>
                        <p class="text-[10px] text-gray-500 uppercase font-semibold">Standard Account</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-white lg:bg-gray-50 relative">
            <!-- Mobile Header -->
            <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100 h-16 flex items-center px-6 justify-between lg:hidden">
                <div class="flex items-center space-x-2">
                    <div class="bg-blue-600 p-1.5 rounded-lg text-white">
                        <i data-lucide="book-open" class="w-4 h-4"></i>
                    </div>
                    <span class="font-bold">SB4 Academy</span>
                </div>
                <button onclick="toggleSidebar(true)" class="text-gray-600">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </header>

            <div id="content-area" class="min-h-full">
                <!-- Content generated by JS -->
            </div>
        </main>
    </div>

    <script>
        const programs = {
            'Guided Learning Experience': [
                { 
                    id: 'j-d1', 
                    day: 'Day 1', 
                    title: 'Demo of Generative AI from Prompt Lab',
                    content: {
                        instructionsLink: 'Images.html', // Replace with actual link
                        appLink: 'https://example.com/start-genai-app',
                        objectives: [
                            'Understanding LLM architectures',
                            'Prompt Engineering basics',
                            'Hands-on with Image Generation models',
                            'Integrating AI into existing Python scripts'
                        ],
                        resources: [
                            { name: 'Lab Manual PDF' },
                            { name: 'Source Code Repository' }
                        ]
                    }
                },
                { id: 'j-d2', day: 'Day 2', title: 'Crop Recommendation Workflow', content: {
                    instructionsLink: 'Images2.html',
                    appLink: 'https://example.com/crop-recs',
                    objectives: [
                        'Understand data preprocessing and feature engineering for crop data',
                        'Build and evaluate crop recommendation models with scikit-learn',
                        'Learn prompt-driven model selection for AutoAI workflows',
                        'Generate production-ready inference scripts for field recommendations'
                    ],
                    resources: [
                        { name: 'Crop Recommendation Lab Guide' },
                        { name: 'AutoAI Code Samples' },
                        { name: 'Data Pipeline Template' }
                    ]
                }},
                { 
            id: 'j-d3', 
            day: 'Day 3', 
            title: 'Chatbot using IBM Watson Assistant',
            content: {
                instructionsLink: 'image3.html',
                appLink: 'https://example.com/chatbot-app',
                objectives: [
                    'Understand IBM Watson Assistant interface',
                    'Create chatbot actions and responses',
                    'Handle user input using variables',
                    'Deploy chatbot with Twilio integration'
                ],
                resources: [
                    { name: 'Chatbot Lab Guide' },
                    { name: 'Watson Assistant Docs' },
                    { name: 'Twilio Integration Guide' }
                ]
            }
        }
            ],
            'FDP': [
                { id: 'f-d1', day: 'Day 1', title: 'Faculty Development Overview', content: null },
                { id: 'f-d2', day: 'Day 2', title: 'Advanced Pedagogy', content: null }
            ],
            'AICTE': [
                { id: 'a-w1', day: 'Week 1', title: 'Curriculum Standardization', content: null },
                { id: 'a-w2', day: 'Week 2', title: 'Industry Integration', content: null }
            ]
        };

        let activeProgram = 'Guided Learning Experience';
        let selectedId = 'j-d1';
        let expandedDays = ['Day 1'];

        function init() {
            renderTabs();
            renderNav();
            renderContent();
            lucide.createIcons();
        }

        function toggleSidebar(open) {
            const sidebar = document.getElementById('sidebar');
            if (open) {
                sidebar.classList.remove('-translate-x-full');
            } else {
                sidebar.classList.add('-translate-x-full');
            }
        }

        function switchProgram(prog) {
            activeProgram = prog;
            selectedId = null;
            renderTabs();
            renderNav();
            renderContent();
            lucide.createIcons();
        }

        function selectItem(id, day) {
            selectedId = id;
            if (!expandedDays.includes(day)) {
                expandedDays.push(day);
            }
            renderNav();
            renderContent();
            lucide.createIcons();
        }

        function renderTabs() {
            const container = document.getElementById('program-tabs');
            container.innerHTML = Object.keys(programs).map(prog => `
                <button onclick="switchProgram('${prog}')" class="flex-none px-3 py-1.5 text-xs font-bold rounded-md transition-all whitespace-nowrap ${activeProgram === prog ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:text-gray-700'}">
                    ${prog}
                </button>
            `).join('');
        }

        function renderNav() {
            const container = document.getElementById('nav-list');
            const list = programs[activeProgram] || [];
            
            container.innerHTML = list.map(item => {
                const isSelected = selectedId === item.id;
                const isExpanded = expandedDays.includes(item.day);
                
                return `
                    <div class="rounded-lg overflow-hidden border border-transparent transition-all">
                        <button onclick="selectItem('${item.id}', '${item.day}')" class="w-full flex items-center justify-between p-3 rounded-lg transition-colors ${isSelected ? 'bg-blue-50 text-blue-700 border-blue-100' : 'hover:bg-gray-50 text-gray-700'}">
                            <div class="flex items-center">
                                <div class="w-2 h-2 rounded-full mr-3 ${isSelected ? 'bg-blue-500' : 'bg-gray-300'}"></div>
                                <span class="font-semibold text-sm">${item.day}</span>
                            </div>
                            <i data-lucide="${isExpanded ? 'chevron-down' : 'chevron-right'}" class="w-4 h-4"></i>
                        </button>
                        ${isExpanded ? `
                            <div class="pl-8 pr-3 pb-3 pt-1">
                                <p class="text-xs leading-tight ${isSelected ? 'text-blue-600 font-medium' : 'text-gray-500'}">
                                    ${item.title}
                                </p>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function renderContent() {
            const container = document.getElementById('content-area');
            const item = programs[activeProgram].find(i => i.id === selectedId);

            if (!item) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-gray-400 p-8 text-center">
                        <i data-lucide="book-open" class="w-16 h-16 mb-4 opacity-20"></i>
                        <h2 class="text-2xl font-semibold">Select a session from the sidebar</h2>
                        <p class="max-w-md mt-2">Choose a program and a specific day to view the curriculum, lab links, and documentation.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            if (!item.content) {
                container.innerHTML = `
                    <div class="max-w-4xl mx-auto p-6 lg:p-10 fade-in-bottom">
                         <div class="mb-8">
                            <span class="text-blue-600 font-bold tracking-widest uppercase text-xs">${activeProgram} • ${item.day}</span>
                            <h1 class="text-3xl font-bold text-gray-900 mt-1">${item.title}</h1>
                        </div>
                        <div class="bg-yellow-50 border-l-4 border-yellow-400 p-6 rounded-r-xl">
                            <p class="text-yellow-700 italic">Content for this session is currently being finalized. Please check back later.</p>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            const { content } = item;
            container.innerHTML = `
                <div class="max-w-4xl mx-auto p-6 lg:p-10 fade-in-bottom">
                    <div class="mb-8">
                        <span class="text-blue-600 font-bold tracking-widest uppercase text-xs">${activeProgram} • ${item.day}</span>
                        <h1 class="text-3xl font-bold text-gray-900 mt-1">${item.title}</h1>
                    </div>

                    <div class="space-y-8">
                        <!-- Documentation Section - Replaces Session Overview -->
                        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-2xl shadow-xl text-white">
                            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                                <div class="flex-1">
                                    <h3 class="text-xl font-bold mb-2 flex items-center">
                                        <i data-lucide="file-text" class="mr-3 w-6 h-6"></i> Lab Instructions & Documentation
                                    </h3>
                                    <p class="text-blue-100 leading-relaxed">
                                        Access the complete step-by-step guide for this lab. This document contains all necessary prompts, code snippets, and configuration steps.
                                    </p>
                                </div>
                                <div class="flex flex-col sm:flex-row gap-3">
                                    <button onclick="window.open('${content.instructionsLink}', '_blank')" class="flex items-center justify-center bg-white text-blue-700 font-bold py-3 px-6 rounded-xl hover:bg-blue-50 transition-all shadow-md whitespace-nowrap">
                                        <i data-lucide="external-link" class="mr-2 w-5 h-5"></i>
                                        Start Lab
                                    </button>

                                </div>
                            </div>
                        </div>

                        <div class="grid md:grid-cols-2 gap-6">
                            <!-- Learning Objectives -->
                            <div class="bg-white border border-gray-200 p-6 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                                <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                                    <i data-lucide="target" class="mr-2 w-5 h-5 text-blue-600"></i> Learning Objectives
                                </h3>
                                <ul class="space-y-4">
                                    ${content.objectives.map((obj, i) => `
                                        <li class="flex items-start text-gray-600 group">
                                            <div class="h-6 w-6 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mr-3 flex-shrink-0 text-xs font-bold group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                                ${i + 1}
                                            </div>
                                            <span class="text-sm pt-0.5">${obj}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>

                            <!-- Additional Resources -->
                            <div class="bg-white border border-gray-200 p-6 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                                <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                                    <i data-lucide="layers" class="mr-2 w-5 h-5 text-blue-600"></i> Quick Access
                                </h3>
                                <div class="space-y-3">
                                    ${content.resources.map(res => `
                                        <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl group cursor-pointer hover:bg-blue-50 hover:border-blue-200 border border-transparent transition-all">
                                            <div class="flex items-center">
                                                <i data-lucide="file" class="w-5 h-5 text-gray-400 mr-3 group-hover:text-blue-500"></i>
                                                <span class="text-gray-700 font-medium text-sm group-hover:text-blue-700">${res.name}</span>
                                            </div>
                                            <i data-lucide="chevron-right" class="w-4 h-4 text-gray-300 group-hover:text-blue-500 group-hover:translate-x-1 transition-all"></i>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
